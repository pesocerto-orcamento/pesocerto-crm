<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peso Certo — CRM Leads</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e1a;--bg2:#0f1424;--card:#141a2e;--border:#1c2540;--border-hi:#2a3558;--text:#e8edf5;--text2:#94a3b8;--text3:#5a6a85;--blue:#3b82f6;--blue-g:rgba(59,130,246,.12);--green:#22c55e;--green-g:rgba(34,197,94,.10);--amber:#f59e0b;--amber-g:rgba(245,158,11,.10);--purple:#a78bfa;--red:#ef4444;--red-g:rgba(239,68,68,.10);--radius:14px;--radius-sm:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:16px;max-width:1100px;margin:0 auto}
.header{text-align:center;padding:20px;margin-bottom:16px;background:linear-gradient(160deg,rgba(59,130,246,.08),rgba(167,139,250,.05));border:1px solid var(--border);border-radius:var(--radius)}
.header img{height:50px;margin-bottom:4px}
.header h1{font-size:20px;font-weight:800}
.header h1 span{background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{color:var(--text2);font-size:11px;margin-top:2px}

/* LOGIN */
.login-box{max-width:360px;margin:40px auto;text-align:center;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:30px}
.login-box h2{font-size:18px;margin-bottom:6px}
.login-box p{color:var(--text2);font-size:12px;margin-bottom:20px}
.login-field{margin-bottom:14px;text-align:left}
.login-field label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);margin-bottom:6px}
.login-field select,.login-field input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600;outline:none;text-align:center;letter-spacing:8px}
.login-field select{letter-spacing:normal;font-family:'DM Sans',sans-serif;text-align:left}
.login-field input:focus,.login-field select:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-g)}
.login-field input.shake{animation:shakeX .4s ease;border-color:var(--red)}
@keyframes shakeX{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
.login-msg{font-size:12px;min-height:20px;margin-top:8px}
.login-msg.err{color:var(--red)}.login-msg.ok{color:var(--green)}.login-msg.wait{color:var(--text3)}

/* KPIS */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:16px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;text-align:center;transition:all .2s}
.kpi:hover{border-color:var(--border-hi);transform:translateY(-1px)}
.kpi.clickable{cursor:pointer}
.kpi.clickable:hover{box-shadow:0 0 0 2px var(--border-hi)}
.kpi.active-filter.red-filter{border-color:var(--red);box-shadow:0 0 0 2px rgba(239,68,68,.25);background:var(--red-g)}
.kpi.active-filter.amber-filter{border-color:var(--amber);box-shadow:0 0 0 2px rgba(245,158,11,.2);background:var(--amber-g)}
.urgency-bar{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.urgency-btn{border:none;border-radius:8px;padding:7px 14px;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;transition:all .2s;display:inline-flex;align-items:center;gap:5px}
.urgency-btn.atrasados{background:var(--red-g);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.urgency-btn.atrasados:hover,.urgency-btn.atrasados.on{background:var(--red);color:#fff}
.urgency-btn.hoje-btn{background:var(--amber-g);color:var(--amber);border:1px solid rgba(245,158,11,.2)}
.urgency-btn.hoje-btn:hover,.urgency-btn.hoje-btn.on{background:var(--amber);color:#1a1a1a}
.urgency-btn.limpar{background:rgba(100,116,139,.1);color:var(--text2);border:1px solid var(--border)}
.urgency-btn.limpar:hover{background:var(--border-hi);color:var(--text)}
.kpi-label{font-size:9px;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);font-weight:700;margin-bottom:3px}
.kpi-val{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700}
.kpi-sub{font-size:9px;color:var(--text2);margin-top:2px}
.c-blue{color:var(--blue)}.c-green{color:var(--green)}.c-amber{color:var(--amber)}.c-purple{color:var(--purple)}.c-red{color:var(--red)}

/* BUTTONS */
.btn{border:none;border-radius:8px;padding:9px 16px;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;transition:all .2s;display:inline-flex;align-items:center;gap:4px}
.btn:hover{transform:translateY(-1px)}
.btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{background:#2563eb}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:#16a34a}
.btn-red{background:var(--red-g);color:var(--red);border:1px solid rgba(239,68,68,.2)}.btn-red:hover{background:var(--red);color:#fff}
.btn-purple{background:rgba(167,139,250,.12);color:var(--purple);border:1px solid rgba(167,139,250,.2)}.btn-purple:hover{background:var(--purple);color:#fff}
.btn-sm{padding:6px 10px;font-size:10px}
.btn-login{width:100%;padding:14px;font-size:15px;margin-top:6px}
.actions{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}

/* SECTION */
.section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:16px}
.section-title{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}

/* FILTERS */
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filters select,.filters input{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;outline:none}

/* LEAD CARDS */
.leads-grid{display:grid;gap:10px}
.lead-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;transition:all .2s}
.lead-card:hover{border-color:var(--border-hi)}
.lead-card.atrasado{border-left:3px solid var(--red)}
.lead-card.hoje{border-left:3px solid var(--amber)}
.lead-card.fechado{border-left:3px solid var(--green);opacity:.7}
.lead-card.perdido{border-left:3px solid var(--text3);opacity:.5}
.lead-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:8px}
.lead-name{font-size:15px;font-weight:700}
.lead-status{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.st-novo{background:var(--blue-g);color:var(--blue)}
.st-orcamento{background:rgba(167,139,250,.15);color:var(--purple)}
.st-followup{background:var(--amber-g);color:var(--amber)}
.st-fechado{background:var(--green-g);color:var(--green)}
.st-perdido{background:rgba(100,116,139,.15);color:var(--text3)}
.lead-info{display:flex;flex-wrap:wrap;gap:6px 16px;font-size:11px;color:var(--text2);margin-bottom:8px}
.lead-info span{display:inline-flex;align-items:center;gap:3px}
.lead-obs{font-size:11px;color:var(--text3);font-style:italic;margin-bottom:8px}
.lead-actions{display:flex;gap:6px;flex-wrap:wrap}
.lead-urgency{font-size:10px;font-weight:700;margin-top:6px}
.status-quick{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;padding:8px;background:rgba(255,255,255,.03);border-radius:8px;border:1px solid var(--border)}
.status-quick span{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);align-self:center;margin-right:2px}
.sq-btn{border:none;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:11px;font-weight:700;font-family:inherit;transition:all .15s;opacity:.6}
.sq-btn:hover{opacity:1;transform:translateY(-1px)}
.sq-btn.active{opacity:1;box-shadow:0 0 0 2px rgba(255,255,255,.15)}
.sq-btn.sq-novo{background:var(--blue-g);color:var(--blue);border:1px solid rgba(59,130,246,.2)}
.sq-btn.sq-orc{background:rgba(167,139,250,.15);color:var(--purple);border:1px solid rgba(167,139,250,.2)}
.sq-btn.sq-follow{background:var(--amber-g);color:var(--amber);border:1px solid rgba(245,158,11,.2)}
.sq-btn.sq-fechado{background:var(--green-g);color:var(--green);border:1px solid rgba(34,197,94,.2)}
.sq-btn.sq-perdido{background:rgba(100,116,139,.1);color:var(--text3);border:1px solid var(--border)}

/* MODAL */
.modal-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;padding:16px}
.modal-bg.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.modal h2{font-size:16px;margin-bottom:16px}
.modal .field{margin-bottom:12px}
.modal .field label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);margin-bottom:4px}
.modal .field input,.modal .field select,.modal .field textarea{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none}
.modal .field textarea{min-height:60px;resize:vertical}
.modal-actions{display:flex;gap:8px;margin-top:16px}

.loading{text-align:center;padding:40px;color:var(--text3)}
.loading .spinner{display:inline-block;width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.footer{text-align:center;padding:16px;color:var(--text3);font-size:10px}
.hidden{display:none}

/* TABS DE NAVEGAÇÃO */
.nav-tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--card);padding:5px;border-radius:var(--radius-sm);border:1px solid var(--border)}
.nav-tab{flex:1;padding:10px;border:none;border-radius:8px;background:transparent;color:var(--text3);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;text-align:center}
.nav-tab:hover{color:var(--text2)}
.nav-tab.active{background:var(--blue);color:#fff;box-shadow:0 2px 8px rgba(59,130,246,.3)}

/* DASHBOARD */
.dash-header{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.dash-header h2{font-size:16px;font-weight:800;flex:1}
.dash-vendedor-sel{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;cursor:pointer}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:18px}
.dash-kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;text-align:center;position:relative;overflow:hidden}
.dash-kpi::after{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.dash-kpi.blue::after{background:var(--blue)}
.dash-kpi.green::after{background:var(--green)}
.dash-kpi.amber::after{background:var(--amber)}
.dash-kpi.red::after{background:var(--red)}
.dash-kpi.purple::after{background:var(--purple)}
.dash-kpi.teal::after{background:#14b8a6}
.dk-label{font-size:9px;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);font-weight:700;margin-bottom:4px}
.dk-val{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;line-height:1}
.dk-sub{font-size:10px;color:var(--text2);margin-top:3px}

/* FUNIL */
.funil-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px}
.funil-title{font-size:13px;font-weight:700;margin-bottom:14px;color:var(--text2)}
.funil-steps{display:flex;flex-direction:column;gap:8px}
.funil-step{display:flex;align-items:center;gap:10px}
.funil-label{font-size:12px;font-weight:600;width:140px;flex-shrink:0}
.funil-bar-wrap{flex:1;background:var(--bg2);border-radius:20px;height:22px;overflow:hidden}
.funil-bar{height:100%;border-radius:20px;transition:width .6s ease;display:flex;align-items:center;padding-left:10px;font-size:11px;font-weight:700;color:#fff;min-width:4px}
.funil-count{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;width:28px;text-align:right;flex-shrink:0}
.funil-pct{font-size:10px;color:var(--text3);width:40px;text-align:right;flex-shrink:0}

/* RANKING */
.ranking-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px}
.ranking-title{font-size:13px;font-weight:700;margin-bottom:14px;color:var(--text2)}
.rank-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.rank-row:last-child{border-bottom:none}
.rank-pos{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:800;width:28px;text-align:center}
.rank-pos.gold{color:#f59e0b}.rank-pos.silver{color:#94a3b8}.rank-pos.bronze{color:#b45309}
.rank-name{font-size:13px;font-weight:700;flex:1}
.rank-bar-wrap{width:100px;background:var(--bg2);border-radius:10px;height:8px;overflow:hidden}
.rank-bar{height:100%;border-radius:10px;background:var(--blue);transition:width .5s}
.rank-val{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--green);width:90px;text-align:right}
.rank-conv{font-size:11px;color:var(--text3);width:44px;text-align:right}

/* ALERTAS */
.alertas-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px}
.alerta-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(28,37,64,.5);font-size:12px}
.alerta-row:last-child{border-bottom:none}
.alerta-icon{font-size:16px;width:24px;flex-shrink:0}
.alerta-nome{font-weight:700;flex:1}
.alerta-info{color:var(--text3);font-size:11px}
.alerta-wpp{background:var(--green-g);color:var(--green);border:1px solid rgba(34,197,94,.2);border-radius:6px;padding:4px 8px;font-size:10px;font-weight:700;text-decoration:none;white-space:nowrap}

.dash-row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:600px){.dash-row2{grid-template-columns:1fr}}
.empty-dash{text-align:center;padding:24px;color:var(--text3);font-size:13px}

/* MULTI-SELECT VENDEDOR */
.vend-filter-wrap{position:relative;display:inline-block}
.vend-filter-btn{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:border-color .2s;white-space:nowrap}
.vend-filter-btn:hover,.vend-filter-btn.open{border-color:var(--blue)}
.vend-filter-btn .badge-count{background:var(--blue);color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:700}
.vend-dropdown{display:none;position:absolute;top:calc(100% + 4px);left:0;background:var(--card);border:1px solid var(--border-hi);border-radius:10px;padding:8px;z-index:50;min-width:200px;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.vend-dropdown.open{display:block}
.vend-dd-actions{display:flex;gap:6px;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.vend-dd-actions button{flex:1;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);border-radius:6px;color:var(--blue);font-size:11px;font-weight:700;padding:5px;cursor:pointer;font-family:inherit}
.vend-dd-actions button:hover{background:var(--blue);color:#fff}
.vend-check-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:7px;cursor:pointer;transition:background .15s}
.vend-check-item:hover{background:rgba(255,255,255,.04)}
.vend-check-item input[type=checkbox]{width:14px;height:14px;accent-color:var(--blue);cursor:pointer;flex-shrink:0}
.vend-check-item label{font-size:13px;cursor:pointer;flex:1}

/* DASHBOARD MULTI-SELECT */
.dash-vend-wrap{position:relative}

/* CONTATO FEITO PANEL */
.contato-feito-btn{width:100%;margin-top:8px;padding:9px;background:rgba(34,197,94,.08);border:1px dashed rgba(34,197,94,.3);border-radius:8px;color:var(--green);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px}
.contato-feito-btn:hover{background:rgba(34,197,94,.15);border-style:solid}
.contato-panel{display:none;margin-top:8px;background:rgba(34,197,94,.05);border:1px solid rgba(34,197,94,.2);border-radius:10px;padding:14px}
.contato-panel.open{display:block}
.contato-panel .cp-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--green);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.contato-panel .cp-field{margin-bottom:10px}
.contato-panel .cp-field label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);margin-bottom:4px}
.contato-panel .cp-field textarea,.contato-panel .cp-field input[type=date],.contato-panel .cp-field input[type=text]{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:8px 10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;outline:none;transition:border-color .2s}
.contato-panel .cp-field textarea{min-height:52px;resize:none}
.contato-panel .cp-field textarea:focus,.contato-panel .cp-field input:focus{border-color:var(--green)}
.contato-panel .cp-actions{display:flex;gap:8px;margin-top:4px}
.cp-save-btn{flex:1;padding:9px;background:var(--green);border:none;border-radius:8px;color:#fff;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:opacity .2s}
.cp-save-btn:hover{opacity:.85}
.cp-cancel-btn{padding:9px 14px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--text3);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer}
.cp-cancel-btn:hover{border-color:var(--border-hi);color:var(--text2)}

/* PRÓXIMA AÇÃO no card */
.prox-acao-bar{display:flex;align-items:center;gap:8px;padding:7px 10px;background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.12);border-radius:8px;margin-bottom:8px;font-size:11px}
.prox-acao-bar .pa-label{color:var(--text3);font-weight:700;text-transform:uppercase;font-size:9px;letter-spacing:.6px;flex-shrink:0}
.prox-acao-bar .pa-text{color:var(--text2);flex:1}
.prox-acao-bar .pa-date{color:var(--blue);font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;flex-shrink:0}

/* TIMELINE ATIVIDADES */
.timeline-wrap{margin-top:10px;border-top:1px solid var(--border);padding-top:10px}
.timeline-toggle{background:none;border:none;color:var(--text3);font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;padding:2px 0;font-family:inherit;transition:color .2s}
.timeline-toggle:hover{color:var(--text2)}
.timeline-body{display:none;margin-top:10px}
.timeline-body.open{display:block}
.timeline-entries{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;max-height:200px;overflow-y:auto}
.timeline-entry{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;position:relative}
.te-header{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.te-date{font-size:10px;font-weight:700;color:var(--blue);font-family:'JetBrains Mono',monospace}
.te-autor{font-size:10px;color:var(--text3)}
.te-text{font-size:12px;color:var(--text2);line-height:1.5;white-space:pre-wrap}
.timeline-add{display:flex;gap:6px;align-items:flex-end}
.timeline-add textarea{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;resize:none;outline:none;min-height:56px;transition:border-color .2s}
.timeline-add textarea:focus{border-color:var(--blue)}

<script>
var API_URL='https://script.google.com/macros/s/AKfycbx9uvPv-GFxp8GJWQLiEgBCHXXUOF9W_iytMPs21n-PIawFyNlAUUFOG_-BcvkCowXB/exec';
var currentUser='';var isGestao=false;var allLeads=[];var vendedoresList=[];var filterUrgency='';

function setUrgFilter(tipo){
  filterUrgency=(filterUrgency===tipo)?'':tipo;
  document.getElementById('btnAtrasados').classList.toggle('on',filterUrgency==='atrasado');
  document.getElementById('btnHoje').classList.toggle('on',filterUrgency==='hoje');
  document.getElementById('btnLimparUrg').style.display=filterUrgency?'inline-flex':'none';
  renderLeads();
}
function clearUrgFilter(){filterUrgency='';document.getElementById('btnAtrasados').classList.remove('on');document.getElementById('btnHoje').classList.remove('on');document.getElementById('btnLimparUrg').style.display='none';renderLeads();}

function quickStatus(id, novoStatus){
  var l=allLeads.find(function(x){return x['ID']===id;});
  if(!l)return;
  var data=Object.assign({},l,{'Status':novoStatus});
  // Feedback visual imediato
  allLeads=allLeads.map(function(x){return x['ID']===id?data:x;});
  renderLeads();
  api({action:'updateLead',id:id,data:JSON.stringify(data)}).then(function(r){
    if(r.success){refreshAll();}
    else{allLeads=allLeads.map(function(x){return x['ID']===id?l:x;});renderLeads();alert('Erro ao atualizar: '+(r.error||''));}
  });
}

function maskP(el){var v=el.value.replace(/\D/g,'');if(v.length>11)v=v.slice(0,11);if(v.length>6)v='('+v.slice(0,2)+') '+v.slice(2,7)+'-'+v.slice(7);else if(v.length>2)v='('+v.slice(0,2)+') '+v.slice(2);else if(v.length>0)v='('+v;el.value=v;}
function R$(v){return'R$ '+parseFloat(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}

function api(params){
  var url=API_URL+'?'+Object.keys(params).map(function(k){return k+'='+encodeURIComponent(params[k]);}).join('&');
  return fetch(url,{redirect:'follow'}).then(function(r){return r.json();});
}

// ===== INIT =====
function init(){
  var msg=document.getElementById('loginMsg');
  msg.className='login-msg wait';msg.textContent='Conectando...';
  api({action:'getVendedores'}).then(function(r){
    if(r.success&&r.vendedores){
      vendedoresList=r.vendedores;
      var sel=document.getElementById('loginSelect');
      var mSel=document.getElementById('m_vendedor');
      sel.innerHTML='<option value="">Selecione...</option>';mSel.innerHTML='';
      r.vendedores.forEach(function(v){
        sel.innerHTML+='<option value="'+v.nome+'">'+v.nome+(v.tipo==='gestao'?' (Gestão)':'')+'</option>';
        mSel.innerHTML+='<option value="'+v.nome+'">'+v.nome+'</option>';
      });
      msg.className='login-msg ok';msg.textContent='✅ Conectado!';
    } else {
      msg.className='login-msg err';msg.textContent='❌ Erro ao carregar vendedores.';
    }
  }).catch(function(e){
    msg.className='login-msg err';msg.textContent='❌ Sem conexão: '+e.message;
  });
}

// ===== LOGIN =====
function doLogin(){
  var nome=document.getElementById('loginSelect').value;
  var pin=document.getElementById('loginPin').value;
  var msg=document.getElementById('loginMsg');
  if(!nome){msg.className='login-msg err';msg.textContent='Selecione seu nome.';return;}
  if(!pin||pin.length<4){msg.className='login-msg err';msg.textContent='Digite sua senha (4 dígitos).';document.getElementById('loginPin').classList.add('shake');setTimeout(function(){document.getElementById('loginPin').classList.remove('shake');},500);return;}

  msg.className='login-msg wait';msg.textContent='Verificando...';
  api({action:'login',nome:nome,senha:pin}).then(function(r){
    if(r.success){
      currentUser=r.nome;
      isGestao=r.tipo==='gestao';
      document.getElementById('loginArea').classList.add('hidden');
      document.getElementById('mainArea').classList.remove('hidden');
      document.getElementById('welcomeMsg').textContent='Olá, '+currentUser+(isGestao?' 👑':'')+'!';
      document.getElementById('urgencyBar').style.display='flex';
      if(isGestao){
        // Multi-select leads
        document.getElementById('vendFilterWrap').classList.remove('hidden');
        buildVendCheckList();
        // Multi-select dashboard
        document.getElementById('dashVendFilterWrap').classList.remove('hidden');
        buildDashVendCheckList();
        document.getElementById('dashRankingWrap') && document.getElementById('dashRankingWrap').classList.remove('hidden');

function getUrg(l,h){if(!l['Próximo Contato']||l['Status']==='Fechado'||l['Status']==='Perdido')return 9;var d=parseDt(l['Próximo Contato']);if(!d)return 9;d.setHours(0,0,0,0);if(d<h)return 1;if(d.getTime()===h.getTime())return 2;return 3;}
function parseDt(v){
  if(!v)return null;
  if(v instanceof Date)return isNaN(v.getTime())?null:v;
  var s=String(v).trim();
  if(!s||s==='null'||s==='undefined')return null;
  // ISO com timezone: 2026-04-14T03:00:00.000Z — extrai só a data ignorando fuso
  if(s.indexOf('T')>-1){var dp=s.split('T')[0];var tp=dp.split('-');if(tp.length===3){var dt=new Date(Number(tp[0]),Number(tp[1])-1,Number(tp[2]));if(!isNaN(dt.getTime()))return dt;}}
  // ISO puro: 2026-04-14
  if(/^\d{4}-\d{1,2}-\d{1,2}$/.test(s)){var p=s.split('-');var d=new Date(Number(p[0]),Number(p[1])-1,Number(p[2]));if(!isNaN(d.getTime()))return d;}
  // dd/mm/yyyy ou d/m/yyyy — detecta ambiguidade pelo valor
  if(/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(s)){var p=s.split('/');var a=Number(p[0]),b=Number(p[1]),c=Number(p[2]);var dd,mm;if(a>12){dd=a;mm=b;}else if(b>12){dd=b;mm=a;}else{dd=a;mm=b;}var d=new Date(c,mm-1,dd);if(!isNaN(d.getTime()))return d;}
  // fallback: deixa o browser tentar (cobre "Mon Apr 14 2026", "April 14, 2026" etc)
  var d=new Date(s);return isNaN(d.getTime())?null:d;
}
function formatDt(v){var d=parseDt(v);return d?d.toLocaleDateString('pt-BR'):'';}
function getStCls(s){if(s==='Novo')return'st-novo';if(s==='Orçamento Enviado')return'st-orcamento';if(s==='Follow-up')return'st-followup';if(s==='Fechado')return'st-fechado';if(s==='Perdido')return'st-perdido';return'';}

function calEvt(enc){
  var l=JSON.parse(decodeURIComponent(enc));
  var dt=parseDt(l['Próximo Contato']);
  if(!dt){alert('Esse lead está com a data de próximo contato inválida ou vazia.');return;}
  // Evento de dia inteiro — evita qualquer problema de fuso horário
  var y=dt.getFullYear();
  var m=String(dt.getMonth()+1).padStart(2,'0');
  var d=String(dt.getDate()).padStart(2,'0');
  var startDate=y+m+d;
  // Dia seguinte para fim do evento all-day
  var dt2=new Date(dt);dt2.setDate(dt2.getDate()+1);
  var y2=dt2.getFullYear();
  var m2=String(dt2.getMonth()+1).padStart(2,'0');
  var d2=String(dt2.getDate()).padStart(2,'0');
  var endDate=y2+m2+d2;

  var t='Follow-up: '+(l['Nome Cliente']||'Lead');
  var det='CRM Peso Certo\n\nCliente: '+(l['Nome Cliente']||'');
  if(l['Celular'])det+='\nCelular: '+l['Celular']+'\nWhatsApp: https://wa.me/55'+l['Celular'].replace(/\D/g,'');
  if(l['Produto'])det+='\nProduto: '+l['Produto'];
  if(l['Valor Estimado'])det+='\nValor: '+R$(l['Valor Estimado']);
  if(l['Cidade'])det+='\nCidade: '+l['Cidade'];
  if(l['Vendedor'])det+='\nVendedor: '+l['Vendedor'];
  if(l['Observações'])det+='\nObs: '+l['Observações'];

  // Datas SEM encodeURIComponent — o Google Calendar não aceita encode nas datas
  var url='https://calendar.google.com/calendar/render?action=TEMPLATE'
    +'&text='+encodeURIComponent(t)
    +'&details='+encodeURIComponent(det)
    +'&dates='+startDate+'/'+endDate;

  var win=window.open(url,'_blank');
  if(!win)window.location.href=url;
}

// ===== TIMELINE DE ATIVIDADES =====
function parseObs(obs){
  if(!obs||!obs.trim())return[];
  // Separador: cada entrada começa com [dd/mm/yyyy hh:mm - Autor]
  var entries=[];
  var parts=obs.split('|||');
  parts.forEach(function(p){
    p=p.trim();
    if(p) entries.push(p);
  });
  return entries;
}

function renderEntries(obs){
  var entries=parseObs(obs);
  if(!entries.length) return '<div class="timeline-empty">Nenhuma atividade registrada ainda.</div>';
  var html='';
  // Mostrar do mais recente para o mais antigo
  entries.slice().reverse().forEach(function(e){
    var match=e.match(/^\[([^\]]+)\]\s*([\s\S]*)$/);
    if(match){
      var header=match[1];
      var texto=match[2].trim();
      html+='<div class="timeline-entry"><div class="te-header"><span class="te-date">'+header+'</span></div><div class="te-text">'+escHtml(texto)+'</div></div>';
    } else {
      html+='<div class="timeline-entry"><div class="te-text">'+escHtml(e)+'</div></div>';
    }
  });
  return html;
}

function escHtml(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function toggleTimeline(id){
  var body=document.getElementById('tl_'+id);
  if(!body)return;
  body.classList.toggle('open');
  var btn=body.previousElementSibling;
  if(btn) btn.textContent=body.classList.contains('open')?
    btn.textContent.replace('▶','▼'):btn.textContent.replace('▼','▶');
}

function addAtividade(id){
  var textarea=document.getElementById('tlt_'+id);
  if(!textarea)return;
  var texto=textarea.value.trim();
  if(!texto){textarea.focus();return;}

  var lead=allLeads.find(function(x){return x['ID']===id;});
  if(!lead)return;

  var now=new Date();
  var dd=String(now.getDate()).padStart(2,'0');
  var mm=String(now.getMonth()+1).padStart(2,'0');
  var hh=String(now.getHours()).padStart(2,'0');
  var min=String(now.getMinutes()).padStart(2,'0');
  var header=dd+'/'+mm+' '+hh+':'+min+' - '+currentUser;
  var entrada='['+header+'] '+texto;

  var obsAtual=lead['Observações']||'';
  var novaObs=obsAtual?(obsAtual+'|||'+entrada):entrada;

  // Feedback imediato
  textarea.value='';
  textarea.disabled=true;
  var novoLead=Object.assign({},lead,{'Observações':novaObs});
  allLeads=allLeads.map(function(x){return x['ID']===id?novoLead:x;});
  var entriesEl=document.getElementById('tle_'+id);
  if(entriesEl) entriesEl.innerHTML=renderEntries(novaObs);

  // Salvar no Sheets
  var data=Object.assign({},novoLead);
  api({action:'updateLead',id:id,data:JSON.stringify(data)}).then(function(r){
    textarea.disabled=false;
    if(!r.success){
      // Reverter
      allLeads=allLeads.map(function(x){return x['ID']===id?lead:x;});
      if(entriesEl) entriesEl.innerHTML=renderEntries(lead['Observações']||'');
      alert('Erro ao salvar: '+(r.error||''));
    }
  }).catch(function(){textarea.disabled=false;});
}

// ===== CONTATO FEITO =====
function toggleContatoPanel(id){
  var panel=document.getElementById('cp_'+id);
  if(!panel)return;
  panel.classList.toggle('open');
  // pré-preencher data com amanhã
  if(panel.classList.contains('open')){
    var inp=document.getElementById('cp_data_'+id);
    if(inp&&!inp.value){var d=new Date();d.setDate(d.getDate()+1);inp.value=d.toISOString().split('T')[0];}
  }
}

function salvarContatoFeito(id){
  var lead=allLeads.find(function(x){return x['ID']===id;});
  if(!lead)return;

  var feito=(document.getElementById('cp_feito_'+id)||{}).value||'';
  var proxAcaoTxt=(document.getElementById('cp_prox_'+id)||{}).value||'';
  var proxData=(document.getElementById('cp_data_'+id)||{}).value||'';

  if(!feito.trim()){document.getElementById('cp_feito_'+id).focus();return;}
  if(!proxData){document.getElementById('cp_data_'+id).focus();return;}

  // Formatar data da próxima ação
  var proxDataFmt='';
  if(proxData){var d=new Date(proxData+'T12:00:00');proxDataFmt=d.toLocaleDateString('pt-BR');}

  // Montar entrada na timeline
  var now=new Date();
  var dd=String(now.getDate()).padStart(2,'0');
  var mm=String(now.getMonth()+1).padStart(2,'0');
  var hh=String(now.getHours()).padStart(2,'0');
  var min=String(now.getMinutes()).padStart(2,'0');
  var header=dd+'/'+mm+' '+hh+':'+min+' - '+currentUser;

  // Entrada: o que foi feito
  var entradaFeito='['+header+'] ✅ CONTATO REALIZADO: '+feito.trim();
  // Entrada: próxima ação
  var entradaProx=proxAcaoTxt.trim()?('['+header+'] ▶ PRÓXIMA AÇÃO: '+proxAcaoTxt.trim()+(proxDataFmt?' | Data: '+proxDataFmt:'')):'';

  var obsAtual=lead['Observações']||'';
  var partes=[obsAtual,entradaFeito];
  if(entradaProx)partes.push(entradaProx);
  var novaObs=partes.filter(Boolean).join('|||');

  // Atualizar próximo contato para a nova data
  var novoLead=Object.assign({},lead,{
    'Observações':novaObs,
    'Próximo Contato':proxDataFmt
  });

  // Feedback imediato
  allLeads=allLeads.map(function(x){return x['ID']===id?novoLead:x;});
  renderLeads();

  // Salvar no Sheets
  api({action:'updateLead',id:id,data:JSON.stringify(novoLead)}).then(function(r){
    if(!r.success){
      allLeads=allLeads.map(function(x){return x['ID']===id?lead:x;});
      renderLeads();
      alert('Erro ao salvar: '+(r.error||''));
    } else {
      loadStats();
    }
  });
}

// Extrai a última entrada PRÓXIMA AÇÃO das observações
function getProxAcao(obs){
  var entries=parseObs(obs);
  // percorre do mais recente ao mais antigo
  for(var i=entries.length-1;i>=0;i--){
    var e=entries[i];
    if(e.indexOf('▶ PRÓXIMA AÇÃO:')>-1){
      var match=e.match(/▶ PRÓXIMA AÇÃO:\s*(.+?)(?:\s*\|\s*Data:\s*(\d{2}\/\d{2}\/\d{4}))?$/);
      if(match) return {texto:match[1].trim(),data:match[2]||null};
    }
  }
  return null;
}

// Extrai data/hora da última atividade registrada
function getUltimaAtividade(obs){
  var entries=parseObs(obs);
  if(!entries.length)return null;
  var ultima=entries[entries.length-1];
  var match=ultima.match(/^\[([^\]]+)\]/);
  return match?match[1]:null;
}

init();

// ===== TABS =====
function switchTab(tab){
  var isLeads = tab === 'leads';
  document.getElementById('abaLeads').classList.toggle('hidden', !isLeads);
  document.getElementById('abaDashboard').classList.toggle('hidden', isLeads);
  document.getElementById('tabLeads').classList.toggle('active', isLeads);
  document.getElementById('tabDash').classList.toggle('active', !isLeads);
  document.getElementById('btnNovoLead').classList.toggle('hidden', !isLeads);
  if(!isLeads) renderDashboard();
}

// ===== DASHBOARD =====
function renderDashboard(){
  var dashVendSel=getDashVendSelecionados();
  var leads = allLeads.filter(function(l){
    if(dashVendSel.length>0) return dashVendSel.indexOf(l['Vendedor'])>=0;
    return true;
  });
  var hoje = new Date(); hoje.setHours(0,0,0,0);

  // Contagens por status
  var novo=0, orc=0, follow=0, fechado=0, perdido=0;
  var valPipeline=0, valFechado=0, valPerdido=0;
  var atrasados=[], semData=[], hojeList=[];

  leads.forEach(function(l){
    var st = l['Status'];
    var val = parseFloat(l['Valor Estimado']||0);
    if(st==='Novo'){novo++; valPipeline+=val;}
    else if(st==='Orçamento Enviado'){orc++; valPipeline+=val;}
    else if(st==='Follow-up'){follow++; valPipeline+=val;}
    else if(st==='Fechado'){fechado++; valFechado+=val;}
    else if(st==='Perdido'){perdido++; valPerdido+=val;}

    var u = getUrg(l, hoje);
    if(u===1) atrasados.push(l);
    else if(u===2) hojeList.push(l);
    if(!l['Próximo Contato'] && st!=='Fechado' && st!=='Perdido') semData.push(l);
  });

  var totalAtivos = novo+orc+follow+fechado+perdido;
  var totalAbertos = novo+orc+follow;
  var taxaConv = totalAtivos>0 ? ((fechado/totalAtivos)*100).toFixed(1) : '0.0';
  var ticketMedio = fechado>0 ? valFechado/fechado : 0;
  var engajamento = totalAbertos>0 ? (((totalAbertos-semData.length)/totalAbertos)*100).toFixed(0) : '100';

  // KPIs
  document.getElementById('dashKpis').innerHTML =
    dkpi('blue','Total de Leads', totalAtivos, totalAbertos+' abertos') +
    dkpi('green','Taxa de Conversão', taxaConv+'%', fechado+' fechados') +
    dkpi('amber','Pipeline Total', R$(valPipeline), totalAbertos+' oportunidades') +
    dkpi('green','Receita Fechada', R$(valFechado), 'ticket médio: '+R$(ticketMedio)) +
    dkpi('red','Atrasados + Hoje', atrasados.length+hojeList.length, atrasados.length+' atr · '+hojeList.length+' hoje') +
    dkpi('teal','Engajamento', engajamento+'%', (totalAbertos-semData.length)+' com data agendada');

  // Funil
  var maxFunil = Math.max(novo,orc,follow,fechado,perdido,1);
  document.getElementById('dashFunil').innerHTML =
    fstep('🆕 Novo', novo, totalAtivos, maxFunil, '#3b82f6') +
    fstep('📋 Orçamento Enviado', orc, totalAtivos, maxFunil, '#a78bfa') +
    fstep('🔄 Follow-up', follow, totalAtivos, maxFunil, '#f59e0b') +
    fstep('✅ Fechado', fechado, totalAtivos, maxFunil, '#22c55e') +
    fstep('❌ Perdido', perdido, totalAtivos, maxFunil, '#5a6a85');

  // Atrasados
  var hAt = '<div class="ranking-title">🔴 Atrasados ('+atrasados.length+')</div>';
  if(atrasados.length===0){
    hAt += '<div class="empty-dash">✅ Nenhum lead atrasado!</div>';
  } else {
    atrasados.forEach(function(l){
      var cc=(l['Celular']||'').replace(/\D/g,'');
      var diasAtr = Math.floor((hoje - parseDt(l['Próximo Contato']))/(1000*60*60*24));
      hAt += '<div class="alerta-row">'
        +'<div class="alerta-icon">🔴</div>'
        +'<div><div class="alerta-nome">'+l['Nome Cliente']+'</div><div class="alerta-info">'+diasAtr+'d atraso · '+l['Status']+(l['Produto']?' · '+l['Produto']:'')+'</div></div>'
        +(cc?'<a class="alerta-wpp" href="https://wa.me/55'+cc+'" target="_blank">WhatsApp</a>':'')
        +'</div>';
    });
  }
  document.getElementById('dashAtrasados').innerHTML = hAt;

  // Sem data
  var hSd = '<div class="ranking-title">📅 Sem Data ('+semData.length+')</div>';
  if(semData.length===0){
    hSd += '<div class="empty-dash">✅ Todos com data agendada!</div>';
  } else {
    semData.forEach(function(l){
      var cc=(l['Celular']||'').replace(/\D/g,'');
      hSd += '<div class="alerta-row">'
        +'<div class="alerta-icon">📅</div>'
        +'<div><div class="alerta-nome">'+l['Nome Cliente']+'</div><div class="alerta-info">'+l['Status']+(l['Produto']?' · '+l['Produto']:'')+'</div></div>'
        +(cc?'<a class="alerta-wpp" href="https://wa.me/55'+cc+'" target="_blank">WhatsApp</a>':'')
        +'</div>';
    });
  }
  document.getElementById('dashSemData').innerHTML = hSd;

  // Ranking (só gestão)
  if(isGestao && dashVendSel.length!==1){
    document.getElementById('dashRankingWrap').classList.remove('hidden');
    renderRanking();
  } else {
    document.getElementById('dashRankingWrap').classList.add('hidden');
  }
}

function renderRanking(){
  var vendedores = {};
  allLeads.forEach(function(l){
    var v = l['Vendedor']||'?';
    if(!vendedores[v]) vendedores[v]={nome:v,total:0,fechado:0,pipeline:0,valFechado:0,atrasados:0};
    vendedores[v].total++;
    var hoje=new Date();hoje.setHours(0,0,0,0);
    if(l['Status']==='Fechado'){vendedores[v].fechado++;vendedores[v].valFechado+=parseFloat(l['Valor Estimado']||0);}
    else if(l['Status']!=='Perdido'){vendedores[v].pipeline+=parseFloat(l['Valor Estimado']||0);}
    if(getUrg(l,hoje)===1) vendedores[v].atrasados++;
  });

  var lista = Object.values(vendedores).sort(function(a,b){return b.valFechado-a.valFechado;});
  var maxVal = lista.length>0 ? Math.max(lista[0].valFechado,1) : 1;
  var posLabels = ['gold','silver','bronze'];
  var posEmoji = ['🥇','🥈','🥉'];

  var html = '';
  lista.forEach(function(v,i){
    var conv = v.total>0 ? ((v.fechado/v.total)*100).toFixed(0) : '0';
    var barW = Math.round((v.valFechado/maxVal)*100);
    var posClass = posLabels[i]||'';
    var posLabel = posEmoji[i]||(i+1)+'º';
    html += '<div class="rank-row">'
      +'<div class="rank-pos '+posClass+'">'+posLabel+'</div>'
      +'<div class="rank-name">'+v.nome+(v.atrasados>0?'  <span style="color:var(--red);font-size:10px">'+v.atrasados+'⚠</span>':'')+'</div>'
      +'<div class="rank-bar-wrap"><div class="rank-bar" style="width:'+barW+'%"></div></div>'
      +'<div class="rank-val">'+R$(v.valFechado)+'</div>'
      +'<div class="rank-conv">'+conv+'% conv</div>'
      +'</div>';
  });
  document.getElementById('dashRanking').innerHTML = html || '<div class="empty-dash">Sem dados</div>';
}

function dkpi(cor,label,val,sub){
  return '<div class="dash-kpi '+cor+'"><div class="dk-label">'+label+'</div><div class="dk-val">'+val+'</div><div class="dk-sub">'+sub+'</div></div>';
}
function fstep(label,count,total,maxVal,color){
  var pct = total>0 ? ((count/total)*100).toFixed(0) : 0;
  var barW = maxVal>0 ? Math.round((count/maxVal)*100) : 0;
  return '<div class="funil-step">'
    +'<div class="funil-label">'+label+'</div>'
    +'<div class="funil-bar-wrap"><div class="funil-bar" style="width:'+barW+'%;background:'+color+'"></div></div>'
    +'<div class="funil-count">'+count+'</div>'
    +'<div class="funil-pct">'+pct+'%</div>'
    +'</div>';
}
