<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peso Certo — CRM Leads</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e1a;--bg2:#0f1424;--card:#141a2e;--border:#1c2540;--border-hi:#2a3558;--text:#e8edf5;--text2:#94a3b8;--text3:#5a6a85;--blue:#3b82f6;--blue-g:rgba(59,130,246,.12);--green:#22c55e;--green-g:rgba(34,197,94,.10);--amber:#f59e0b;--amber-g:rgba(245,158,11,.10);--purple:#a78bfa;--red:#ef4444;--red-g:rgba(239,68,68,.10);--radius:14px;--radius-sm:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:16px;max-width:1100px;margin:0 auto}
.header{text-align:center;padding:20px;margin-bottom:16px;background:linear-gradient(160deg,rgba(59,130,246,.08),rgba(167,139,250,.05));border:1px solid var(--border);border-radius:var(--radius)}
.header img{height:50px;margin-bottom:4px}
.header h1{font-size:20px;font-weight:800}
.header h1 span{background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{color:var(--text2);font-size:11px;margin-top:2px}

/* LOGIN */
.login-box{max-width:360px;margin:40px auto;text-align:center;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:30px}
.login-box h2{font-size:18px;margin-bottom:6px}
.login-box p{color:var(--text2);font-size:12px;margin-bottom:20px}
.login-field{margin-bottom:14px;text-align:left}
.login-field label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);margin-bottom:6px}
.login-field select,.login-field input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600;outline:none;text-align:center;letter-spacing:8px}
.login-field select{letter-spacing:normal;font-family:'DM Sans',sans-serif;text-align:left}
.login-field input:focus,.login-field select:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-g)}
.login-field input.shake{animation:shakeX .4s ease;border-color:var(--red)}
@keyframes shakeX{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
.login-msg{font-size:12px;min-height:20px;margin-top:8px}
.login-msg.err{color:var(--red)}.login-msg.ok{color:var(--green)}.login-msg.wait{color:var(--text3)}

/* KPIS */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:16px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;text-align:center;transition:all .2s}
.kpi:hover{border-color:var(--border-hi);transform:translateY(-1px)}
.kpi-label{font-size:9px;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);font-weight:700;margin-bottom:3px}
.kpi-val{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700}
.kpi-sub{font-size:9px;color:var(--text2);margin-top:2px}
.c-blue{color:var(--blue)}.c-green{color:var(--green)}.c-amber{color:var(--amber)}.c-purple{color:var(--purple)}.c-red{color:var(--red)}

/* BUTTONS */
.btn{border:none;border-radius:8px;padding:9px 16px;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;transition:all .2s;display:inline-flex;align-items:center;gap:4px}
.btn:hover{transform:translateY(-1px)}
.btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{background:#2563eb}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:#16a34a}
.btn-red{background:var(--red-g);color:var(--red);border:1px solid rgba(239,68,68,.2)}.btn-red:hover{background:var(--red);color:#fff}
.btn-purple{background:rgba(167,139,250,.12);color:var(--purple);border:1px solid rgba(167,139,250,.2)}.btn-purple:hover{background:var(--purple);color:#fff}
.btn-sm{padding:6px 10px;font-size:10px}
.btn-login{width:100%;padding:14px;font-size:15px;margin-top:6px}
.actions{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}

/* SECTION */
.section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:16px}
.section-title{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}

/* FILTERS */
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filters select,.filters input{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;outline:none}

/* LEAD CARDS */
.leads-grid{display:grid;gap:10px}
.lead-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;transition:all .2s}
.lead-card:hover{border-color:var(--border-hi)}
.lead-card.atrasado{border-left:3px solid var(--red)}
.lead-card.hoje{border-left:3px solid var(--amber)}
.lead-card.fechado{border-left:3px solid var(--green);opacity:.7}
.lead-card.perdido{border-left:3px solid var(--text3);opacity:.5}
.lead-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:8px}
.lead-name{font-size:15px;font-weight:700}
.lead-status{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.st-novo{background:var(--blue-g);color:var(--blue)}
.st-orcamento{background:rgba(167,139,250,.15);color:var(--purple)}
.st-followup{background:var(--amber-g);color:var(--amber)}
.st-fechado{background:var(--green-g);color:var(--green)}
.st-perdido{background:rgba(100,116,139,.15);color:var(--text3)}
.lead-info{display:flex;flex-wrap:wrap;gap:6px 16px;font-size:11px;color:var(--text2);margin-bottom:8px}
.lead-info span{display:inline-flex;align-items:center;gap:3px}
.lead-obs{font-size:11px;color:var(--text3);font-style:italic;margin-bottom:8px}
.lead-actions{display:flex;gap:6px;flex-wrap:wrap}
.lead-urgency{font-size:10px;font-weight:700;margin-top:6px}

/* MODAL */
.modal-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;padding:16px}
.modal-bg.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.modal h2{font-size:16px;margin-bottom:16px}
.modal .field{margin-bottom:12px}
.modal .field label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);margin-bottom:4px}
.modal .field input,.modal .field select,.modal .field textarea{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none}
.modal .field textarea{min-height:60px;resize:vertical}
.modal-actions{display:flex;gap:8px;margin-top:16px}

.loading{text-align:center;padding:40px;color:var(--text3)}
.loading .spinner{display:inline-block;width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.footer{text-align:center;padding:16px;color:var(--text3);font-size:10px}
.hidden{display:none}
</style>
</head>

<!-- LOGIN -->
<div id="loginArea">
  <div class="login-box">
    <h2>🔒 Acesso ao CRM</h2>
    <p>Selecione seu nome e digite sua senha</p>
    <div class="login-field">
      <label>👤 Vendedor</label>
      <select id="loginSelect"><option value="">Carregando...</option></select>
    </div>
    <div class="login-field">
      <label>🔑 Senha (PIN)</label>
      <input type="password" id="loginPin" maxlength="4" placeholder="••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn btn-blue btn-login" onclick="doLogin()">Entrar</button>
    <div class="login-msg" id="loginMsg"></div>
  </div>
</div>

<!-- MAIN -->
<div id="mainArea" class="hidden">
  <div class="actions">
    <span style="font-size:14px;font-weight:700" id="welcomeMsg"></span>
    <div style="flex:1"></div>
    <button class="btn btn-blue" onclick="openModal()">+ Novo Lead</button>
    <button class="btn btn-purple" onclick="refreshAll()">🔄 Atualizar</button>
    <button class="btn btn-red" onclick="doLogout()">Sair</button>
  </div>
  <div class="kpis" id="kpis"></div>
  <div class="section">
    <div class="section-title">📋 Leads</div>
    <div class="filters">
      <select id="filterStatus" onchange="renderLeads()">
        <option value="">Todos os Status</option>
        <option value="Novo">🆕 Novo</option>
        <option value="Orçamento Enviado">📋 Orçamento Enviado</option>
        <option value="Follow-up">🔄 Follow-up</option>
        <option value="Fechado">✅ Fechado</option>
        <option value="Perdido">❌ Perdido</option>
      </select>
      <select id="filterVendedor" onchange="renderLeads()" class="hidden">
        <option value="">Todos os Vendedores</option>
      </select>
      <input type="text" id="filterSearch" placeholder="🔍 Buscar nome..." oninput="renderLeads()">
    </div>
    <div id="leadsArea"><div class="loading"><div class="spinner"></div><br>Carregando leads...</div></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2 id="modalTitle">Novo Lead</h2>
    <input type="hidden" id="m_id">
    <div class="field"><label>Nome do Cliente *</label><input type="text" id="m_nome" placeholder="Nome completo"></div>
    <div class="field"><label>Celular *</label><input type="tel" id="m_cel" placeholder="(24) 99999-0000" oninput="maskP(this)"></div>
    <div class="field"><label>Cidade</label><input type="text" id="m_cidade" placeholder="Ex: Barra Mansa"></div>
    <div class="field"><label>Produto de Interesse</label><input type="text" id="m_produto" placeholder="Ex: Freezer 560L"></div>
    <div class="field"><label>Valor Estimado (R$)</label><input type="number" id="m_valor" placeholder="0"></div>
    <div class="field"><label>Vendedor</label><select id="m_vendedor"></select></div>
    <div class="field"><label>Status</label>
      <select id="m_status">
        <option value="Novo">🆕 Novo</option>
        <option value="Orçamento Enviado">📋 Orçamento Enviado</option>
        <option value="Follow-up">🔄 Follow-up</option>
        <option value="Fechado">✅ Fechado</option>
        <option value="Perdido">❌ Perdido</option>
      </select>
    </div>
    <div class="field"><label>Próximo Contato</label><input type="date" id="m_prox"></div>
    <div class="field"><label>Observações</label><textarea id="m_obs" placeholder="Anotações..."></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-green" onclick="saveLead()">💾 Salvar</button>
      <button class="btn btn-red" onclick="closeModal()">Cancelar</button>
    </div>
  </div>
</div>

<div class="footer">Peso Certo Comercial — CRM de Leads</div>

<script>
var API_URL='https://script.google.com/macros/s/AKfycbx9uvPv-GFxp8GJWQLiEgBCHXXUOF9W_iytMPs21n-PIawFyNlAUUFOG_-BcvkCowXB/exec';
var currentUser='';var isGestao=false;var allLeads=[];var vendedoresList=[];

function maskP(el){var v=el.value.replace(/\D/g,'');if(v.length>11)v=v.slice(0,11);if(v.length>6)v='('+v.slice(0,2)+') '+v.slice(2,7)+'-'+v.slice(7);else if(v.length>2)v='('+v.slice(0,2)+') '+v.slice(2);else if(v.length>0)v='('+v;el.value=v;}
function R$(v){return'R$ '+parseFloat(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}

function api(params){
  var url=API_URL+'?'+Object.keys(params).map(function(k){return k+'='+encodeURIComponent(params[k]);}).join('&');
  return fetch(url,{redirect:'follow'}).then(function(r){return r.json();});
}

// ===== INIT =====
function init(){
  var msg=document.getElementById('loginMsg');
  msg.className='login-msg wait';msg.textContent='Conectando...';
  api({action:'getVendedores'}).then(function(r){
    if(r.success&&r.vendedores){
      vendedoresList=r.vendedores;
      var sel=document.getElementById('loginSelect');
      var mSel=document.getElementById('m_vendedor');
      var fSel=document.getElementById('filterVendedor');
      sel.innerHTML='<option value="">Selecione...</option>';mSel.innerHTML='';
      r.vendedores.forEach(function(v){
        sel.innerHTML+='<option value="'+v.nome+'">'+v.nome+(v.tipo==='gestao'?' (Gestão)':'')+'</option>';
        mSel.innerHTML+='<option value="'+v.nome+'">'+v.nome+'</option>';
        if(v.tipo!=='gestao')fSel.innerHTML+='<option value="'+v.nome+'">'+v.nome+'</option>';
      });
      msg.className='login-msg ok';msg.textContent='✅ Conectado!';
    } else {
      msg.className='login-msg err';msg.textContent='❌ Erro ao carregar vendedores.';
    }
  }).catch(function(e){
    msg.className='login-msg err';msg.textContent='❌ Sem conexão: '+e.message;
  });
}

// ===== LOGIN =====
function doLogin(){
  var nome=document.getElementById('loginSelect').value;
  var pin=document.getElementById('loginPin').value;
  var msg=document.getElementById('loginMsg');
  if(!nome){msg.className='login-msg err';msg.textContent='Selecione seu nome.';return;}
  if(!pin||pin.length<4){msg.className='login-msg err';msg.textContent='Digite sua senha (4 dígitos).';document.getElementById('loginPin').classList.add('shake');setTimeout(function(){document.getElementById('loginPin').classList.remove('shake');},500);return;}

  msg.className='login-msg wait';msg.textContent='Verificando...';
  api({action:'login',nome:nome,senha:pin}).then(function(r){
    if(r.success){
      currentUser=r.nome;
      isGestao=r.tipo==='gestao';
      document.getElementById('loginArea').classList.add('hidden');
      document.getElementById('mainArea').classList.remove('hidden');
      document.getElementById('welcomeMsg').textContent='Olá, '+currentUser+(isGestao?' 👑':'')+'!';
      if(isGestao)document.getElementById('filterVendedor').classList.remove('hidden');
      document.getElementById('m_vendedor').value=currentUser;
      refreshAll();
    } else {
      msg.className='login-msg err';msg.textContent='🔴 Senha incorreta!';
      document.getElementById('loginPin').value='';
      document.getElementById('loginPin').classList.add('shake');
      setTimeout(function(){document.getElementById('loginPin').classList.remove('shake');},500);
    }
  }).catch(function(e){
    msg.className='login-msg err';msg.textContent='❌ Erro: '+e.message;
  });
}

function doLogout(){currentUser='';isGestao=false;document.getElementById('mainArea').classList.add('hidden');document.getElementById('loginArea').classList.remove('hidden');document.getElementById('loginPin').value='';document.getElementById('loginMsg').textContent='';}
function refreshAll(){loadLeads();loadStats();}

// ===== LEADS =====
function loadLeads(){
  document.getElementById('leadsArea').innerHTML='<div class="loading"><div class="spinner"></div><br>Carregando...</div>';
  api({action:'getLeads',vendedor:isGestao?'Gestão':currentUser}).then(function(r){
    if(r.success){allLeads=r.leads;renderLeads();}
    else document.getElementById('leadsArea').innerHTML='<p style="color:var(--red)">Erro: '+r.error+'</p>';
  });
}

function renderLeads(){
  var status=document.getElementById('filterStatus').value;
  var vend=document.getElementById('filterVendedor').value;
  var search=document.getElementById('filterSearch').value.toLowerCase();
  var hoje=new Date();hoje.setHours(0,0,0,0);
  var filtered=allLeads.filter(function(l){
    if(status&&l['Status']!==status)return false;
    if(vend&&l['Vendedor']!==vend)return false;
    if(search&&(l['Nome Cliente']||'').toLowerCase().indexOf(search)<0)return false;
    return true;
  });
  filtered.sort(function(a,b){return getUrg(a,hoje)-getUrg(b,hoje);});
  if(!filtered.length){document.getElementById('leadsArea').innerHTML='<p style="color:var(--text3);text-align:center;padding:30px">Nenhum lead encontrado</p>';return;}
  var html='<div class="leads-grid">';
  filtered.forEach(function(l){
    var u=getUrg(l,hoje);
    var uc=u===1?'atrasado':u===2?'hoje':l['Status']==='Fechado'?'fechado':l['Status']==='Perdido'?'perdido':'';
    var sc=getStCls(l['Status']);
    var cc=(l['Celular']||'').replace(/\D/g,'');
    var ut=u===1?'<div class="lead-urgency c-red">🔴 ATRASADO — contato era '+formatDt(l['Próximo Contato'])+'</div>':u===2?'<div class="lead-urgency c-amber">🟡 HOJE — ligar!</div>':'';
    html+='<div class="lead-card '+uc+'"><div class="lead-top"><div class="lead-name">'+l['Nome Cliente']+'</div><span class="lead-status '+sc+'">'+l['Status']+'</span></div>'
      +'<div class="lead-info">'+(l['Celular']?'<span>📱 '+l['Celular']+'</span>':'')+(l['Cidade']?'<span>📍 '+l['Cidade']+'</span>':'')+(l['Produto']?'<span>📦 '+l['Produto']+'</span>':'')+(l['Valor Estimado']?'<span>💰 '+R$(l['Valor Estimado'])+'</span>':'')+(isGestao?'<span>👤 '+l['Vendedor']+'</span>':'')+(l['Próximo Contato']?'<span>📅 '+formatDt(l['Próximo Contato'])+'</span>':'')+'</div>'
      +(l['Observações']?'<div class="lead-obs">'+l['Observações']+'</div>':'')+ut
      +'<div class="lead-actions">'+(cc?'<a class="btn btn-green btn-sm" href="https://wa.me/55'+cc+'" target="_blank">📱 WhatsApp</a>':'')
      +'<button class="btn btn-purple btn-sm" onclick="calEvt(\''+encodeURIComponent(JSON.stringify(l))+'\')">📅 Lembrete</button>'
      +'<button class="btn btn-blue btn-sm" onclick="editLead(\''+l['ID']+'\')">✏️</button>'
      +'<button class="btn btn-red btn-sm" onclick="delLead(\''+l['ID']+'\')">🗑️</button>'
      +'</div></div>';
  });
  html+='</div>';document.getElementById('leadsArea').innerHTML=html;
}

function getUrg(l,h){if(!l['Próximo Contato']||l['Status']==='Fechado'||l['Status']==='Perdido')return 9;var d=parseDt(l['Próximo Contato']);if(!d)return 9;d.setHours(0,0,0,0);if(d<h)return 1;if(d.getTime()===h.getTime())return 2;return 3;}
function parseDt(v){if(!v)return null;if(v instanceof Date)return isNaN(v.getTime())?null:v;var s=String(v).trim();var p=s.split('/');if(p.length===3){var d1=new Date(Number(p[2]),Number(p[1])-1,Number(p[0]));return isNaN(d1.getTime())?null:d1;}p=s.split('-');if(p.length===3){var d2=new Date(Number(p[0]),Number(p[1])-1,Number(p[2]));return isNaN(d2.getTime())?null:d2;}return null;}
function formatDt(v){var d=parseDt(v);return d?d.toLocaleDateString('pt-BR'):'';}
function getStCls(s){if(s==='Novo')return'st-novo';if(s==='Orçamento Enviado')return'st-orcamento';if(s==='Follow-up')return'st-followup';if(s==='Fechado')return'st-fechado';if(s==='Perdido')return'st-perdido';return'';}

function loadStats(){
  api({action:'getStats',vendedor:isGestao?'Gestão':currentUser}).then(function(r){
    if(!r.success)return;var s=r.stats||{};
    var total=Number(s.total||0), atrasados=Number(s.atrasados||0), hoje=Number(s.hoje||0), novo=Number(s.novo||0), orcamento=Number(s.orcamento||0), followup=Number(s.followup||0), fechado=Number(s.fechado||0);
    var valorPipeline=Number(s.valorPipeline||0), valorFechado=Number(s.valorFechado||0);
    document.getElementById('kpis').innerHTML=
      '<div class="kpi"><div class="kpi-label">Total</div><div class="kpi-val c-blue">'+total+'</div></div>'
      +'<div class="kpi"><div class="kpi-label">🔴 Atrasados</div><div class="kpi-val c-red">'+atrasados+'</div></div>'
      +'<div class="kpi"><div class="kpi-label">🟡 Hoje</div><div class="kpi-val c-amber">'+hoje+'</div></div>'
      +'<div class="kpi"><div class="kpi-label">Pipeline</div><div class="kpi-val c-purple">'+R$(valorPipeline)+'</div><div class="kpi-sub">'+(novo+orcamento+followup)+' abertos</div></div>'
      +'<div class="kpi"><div class="kpi-label">Fechados</div><div class="kpi-val c-green">'+R$(valorFechado)+'</div><div class="kpi-sub">'+fechado+' vendas</div></div>';
  });
}

// ===== MODAL =====
function openModal(){document.getElementById('modalTitle').textContent='Novo Lead';document.getElementById('m_id').value='';document.getElementById('m_nome').value='';document.getElementById('m_cel').value='';document.getElementById('m_cidade').value='';document.getElementById('m_produto').value='';document.getElementById('m_valor').value='';document.getElementById('m_vendedor').value=currentUser;document.getElementById('m_status').value='Novo';var nd=new Date();nd.setDate(nd.getDate()+1);document.getElementById('m_prox').value=nd.toISOString().split('T')[0];document.getElementById('m_obs').value='';document.getElementById('modalBg').classList.add('show');}
function closeModal(){document.getElementById('modalBg').classList.remove('show');}
function editLead(id){var l=allLeads.find(function(x){return x['ID']===id;});if(!l)return;document.getElementById('m_id').value=id;document.getElementById('m_nome').value=l['Nome Cliente']||'';document.getElementById('m_cel').value=l['Celular']||'';document.getElementById('m_cidade').value=l['Cidade']||'';document.getElementById('m_produto').value=l['Produto']||'';document.getElementById('m_valor').value=l['Valor Estimado']||'';document.getElementById('m_vendedor').value=l['Vendedor']||currentUser;document.getElementById('m_status').value=l['Status']||'Novo';var dt=parseDt(l['Próximo Contato']);document.getElementById('m_prox').value=dt?dt.toISOString().split('T')[0]:'';document.getElementById('m_obs').value=l['Observações']||'';document.getElementById('modalTitle').textContent='Editar Lead';document.getElementById('modalBg').classList.add('show');}

function saveLead(){
  var id=document.getElementById('m_id').value;
  var nome=document.getElementById('m_nome').value.trim();
  if(!nome){alert('Nome é obrigatório!');return;}
  var proxVal=document.getElementById('m_prox').value;
  var proxF='';if(proxVal){var d=new Date(proxVal+'T12:00:00');proxF=d.toLocaleDateString('pt-BR');}
  var data={'Vendedor':document.getElementById('m_vendedor').value,'Nome Cliente':nome,'Celular':document.getElementById('m_cel').value,'Cidade':document.getElementById('m_cidade').value,'Produto':document.getElementById('m_produto').value,'Valor Estimado':document.getElementById('m_valor').value,'Status':document.getElementById('m_status').value,'Próximo Contato':proxF,'Observações':document.getElementById('m_obs').value};
  api(id?{action:'updateLead',id:id,data:JSON.stringify(data)}:{action:'addLead',data:JSON.stringify(data)}).then(function(r){if(r.success){closeModal();refreshAll();}else alert('Erro: '+(r.error||r.message));});
}

function delLead(id){if(!confirm('Excluir este lead?'))return;api({action:'deleteLead',id:id}).then(function(r){if(r.success)refreshAll();else alert('Erro: '+r.error);});}

function calEvt(enc){
  var l=JSON.parse(decodeURIComponent(enc));
  var dt=parseDt(l['Próximo Contato']);
  if(!dt){alert('Esse lead está com a data de próximo contato inválida ou vazia.');return;}
  dt.setHours(9,0,0,0);
  var endDt=new Date(dt.getTime()+30*60000);
  function gcalDate(d){var yyyy=d.getFullYear();var mm=String(d.getMonth()+1).padStart(2,'0');var dd=String(d.getDate()).padStart(2,'0');var hh=String(d.getHours()).padStart(2,'0');var mi=String(d.getMinutes()).padStart(2,'0');return ''+yyyy+mm+dd+'T'+hh+mi+'00';}
  var t='Follow-up: '+(l['Nome Cliente']||'Lead');
  var det='Cliente: '+(l['Nome Cliente']||'');
  if(l['Celular'])det+='\nCelular: '+l['Celular'];
  if(l['Produto'])det+='\nProduto: '+l['Produto'];
  if(l['Valor Estimado'])det+='\nValor: '+R$(l['Valor Estimado']);
  if(l['Cidade'])det+='\nCidade: '+l['Cidade'];
  if(l['Observações'])det+='\nObservações: '+l['Observações'];
  var url='https://calendar.google.com/calendar/render?action=TEMPLATE'+'&text='+encodeURIComponent(t)+'&details='+encodeURIComponent(det)+'&dates='+encodeURIComponent(gcalDate(dt)+'/'+gcalDate(endDt))+'&ctz='+encodeURIComponent('America/Sao_Paulo');
  var win=window.open(url,'_blank');
  if(!win)window.location.href=url;
}

init();
</script>
</body>
</html>
